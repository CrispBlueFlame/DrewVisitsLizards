<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendar — Drew &amp; Sarah · NZ + Fiji 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #F8F6F2;
    --card-bg:  #FFFFFF;
    --text:     #2D2D2D;
    --muted:    #9A9A9A;
    --label:    #6A6A6A;
    --border:   #E8E4DF;

    --coral:    #C85A3C;
    --amber:    #B87820;
    --slate:    #3D72A0;
    --teal:     #2E8E8E;
    --forest:   #3A7E58;
    --sage:     #4E9260;
    --lavender: #6E5CA8;
    --terra:    #A85530;
    --plum:     #804E7C;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
    line-height: 1.5;
    padding: 48px 16px 80px;
  }

  .page { max-width: 860px; margin: 0 auto; }

  header {
    border-bottom: 1px solid var(--border);
    padding-bottom: 28px;
    margin-bottom: 24px;
  }

  .trip-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  h1 { font-size: 32px; font-weight: 700; line-height: 1.1; margin-bottom: 8px; }

  .meta { color: var(--label); font-size: 14px; display: flex; gap: 20px; flex-wrap: wrap; }

  nav {
    margin-bottom: 32px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    display: flex;
    gap: 22px;
    flex-wrap: wrap;
  }

  nav a {
    color: var(--slate);
    text-decoration: none;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  nav a:hover { text-decoration: underline; }

  .month-label {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--label);
    margin-bottom: 14px;
  }

  /* Legend */
  .legend {
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
    margin-bottom: 20px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--label);
  }

  .legend span { display: flex; align-items: center; gap: 7px; }

  .swatch { width: 11px; height: 11px; border-radius: 3px; display: inline-block; }
  .sw-flight { background: var(--coral); }
  .sw-stay   { background: var(--sage); }
  .sw-jr     { background: var(--slate); }
  .sw-overlap { background: rgba(61,114,160,0.12); border: 1px solid rgba(61,114,160,0.35); }

  /* Weekday header */
  .weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    margin-bottom: 6px;
  }

  .weekdays div {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
    padding: 4px 0;
  }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
  }

  .cell {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    min-height: 96px;
    padding: 7px 7px 8px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .cell.blank { background: transparent; border: none; }

  .cell.overlap { background: rgba(61,114,160,0.06); }

  .cell.today { box-shadow: 0 0 0 2px var(--slate); }

  .daynum {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    color: var(--text);
  }

  .cell.overlap .daynum { color: var(--slate); }

  .chip {
    font-size: 10px;
    line-height: 1.25;
    color: #fff;
    border-radius: 4px;
    padding: 3px 5px;
    word-break: break-word;
    cursor: pointer;
    transition: filter 0.12s ease;
  }

  .chip:hover { filter: brightness(1.08); }

  .chip.flight { background: var(--coral); }
  .chip.stay   { background: var(--sage); }
  .chip.jr     { background: var(--slate); }

  @media (max-width: 620px) {
    .cell { min-height: 76px; padding: 5px; }
    .chip { font-size: 9px; padding: 2px 4px; }
    .weekdays div { font-size: 8px; }
  }

  /* Timeline card (rendered inside the modal, mirrors index.html) */
  .card {
    background: var(--card-bg);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 10px;
    border: 1px solid var(--border);
    border-left-width: 4px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }

  .card:last-child { margin-bottom: 0; }

  .c-coral    { border-left-color: var(--coral); }
  .c-amber    { border-left-color: var(--amber); }
  .c-slate    { border-left-color: var(--slate); }
  .c-teal     { border-left-color: var(--teal); }
  .c-forest   { border-left-color: var(--forest); }
  .c-sage     { border-left-color: var(--sage); }
  .c-lavender { border-left-color: var(--lavender); }
  .c-terra    { border-left-color: var(--terra); }
  .c-plum     { border-left-color: var(--plum); }

  .card-type {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .c-coral    .card-type { color: var(--coral); }
  .c-amber    .card-type { color: var(--amber); }
  .c-slate    .card-type { color: var(--slate); }
  .c-teal     .card-type { color: var(--teal); }
  .c-forest   .card-type { color: var(--forest); }
  .c-sage     .card-type { color: var(--sage); }
  .c-lavender .card-type { color: var(--lavender); }
  .c-terra    .card-type { color: var(--terra); }
  .c-plum     .card-type { color: var(--plum); }

  .route { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }

  .iata {
    font-family: 'Space Mono', monospace;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.05em;
  }

  .arrow-line { flex: 1; height: 1px; background: var(--border); position: relative; }

  .arrow-line::after {
    content: '▶';
    font-size: 7px;
    position: absolute;
    right: -2px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
  }

  .flight-details { display: flex; gap: 16px; flex-wrap: wrap; font-size: 13px; color: var(--label); }
  .flight-details strong { color: var(--text); font-weight: 600; }

  .flight-num { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); margin-bottom: 4px; }

  .stay-name { font-weight: 600; font-size: 15px; margin-bottom: 3px; }
  .stay-details { font-size: 13px; color: var(--label); line-height: 1.6; }
  .note { font-size: 12px; color: var(--muted); margin-top: 4px; font-style: italic; }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(45,45,45,0.45);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
    z-index: 1000;
  }

  .modal-overlay.open { display: flex; }

  .modal-box { width: 100%; max-width: 460px; }

  .modal-date {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #fff;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .modal-close {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 22px;
    line-height: 1;
    color: #fff;
    background: none;
    border: none;
    cursor: pointer;
    padding: 0 4px;
  }

  footer {
    margin-top: 40px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }
</style>
</head>
<body>
<div class="page">

  <header>
    <div class="trip-label">Calendar · July 2026</div>
    <h1>New Zealand + Fiji</h1>
    <div class="meta">
      <span>Andrew Wirkkala &amp; Sarah Menner</span>
      <span>2 Jul – 28 Jul 2026</span>
    </div>
  </header>

  <nav>
    <a href="index.html">&larr; Timeline</a>
    <a href="activities.html">Things to Do &rarr;</a>
  </nav>

  <div class="month-label">July 2026</div>

  <div class="legend">
    <span><span class="swatch sw-flight"></span> Flight</span>
    <span><span class="swatch sw-stay"></span> Stay</span>
    <span><span class="swatch sw-jr"></span> Jesse &amp; Ross</span>
    <span><span class="swatch sw-overlap"></span> All four together</span>
  </div>

  <div class="weekdays">
    <div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div><div>Sun</div>
  </div>

  <div class="grid" id="grid"></div>

  <div class="modal-overlay" id="modal">
    <div class="modal-box">
      <div class="modal-date">
        <span id="modalDate"></span>
        <button class="modal-close" id="modalClose" aria-label="Close">&times;</button>
      </div>
      <div id="modalCards"></div>
    </div>
  </div>

  <footer>
    <span>Andrew Wirkkala + Sarah Menner · NZ + Fiji 2026</span>
    <span>Jesse &amp; Ross join 13 – 24 Jul</span>
  </footer>

</div>

<script>
const YEAR = 2026;
const MONTH = 6; // July (0-based)
const OVERLAP = { start: 13, end: 24 }; // days all four are together
const TODAY = new Date();

const EVENTS = {
  2:  [{ cat: 'flight', label: 'LAX → NAN' }],
  4:  [{ cat: 'flight', label: 'NAN → AKL' }],
  5:  [{ cat: 'flight', label: 'AKL → PMR' }, { cat: 'stay', label: 'Check in · Palmy' }],
  10: [{ cat: 'stay', label: 'Check in · Wellington' }],
  12: [{ cat: 'stay', label: 'Checkout · Wellington' }],
  13: [{ cat: 'jr', label: 'J&R arrive · Palmy' }],
  17: [{ cat: 'jr', label: 'J&R drive · PMR → CHC' }],
  18: [{ cat: 'stay', label: 'Checkout · Palmy' }, { cat: 'flight', label: 'PMR → CHC' }, { cat: 'stay', label: 'Check in · Christchurch' }],
  21: [{ cat: 'stay', label: 'Checkout · CHC' }, { cat: 'flight', label: 'CHC → ZQN' }, { cat: 'stay', label: 'Check in · Queenstown' }, { cat: 'jr', label: 'J&R drive · CHC → ZQN' }],
  24: [{ cat: 'stay', label: 'Checkout · Queenstown' }, { cat: 'flight', label: 'ZQN → AKL' }, { cat: 'jr', label: 'J&R drive north' }],
  25: [{ cat: 'flight', label: 'AKL → NAN' }],
  28: [{ cat: 'flight', label: 'NAN → LAX' }]
};

const grid = document.getElementById('grid');
const firstDay = new Date(YEAR, MONTH, 1).getDay();      // 0=Sun..6=Sat
const lead = (firstDay + 6) % 7;                         // Monday-first leading blanks
const daysInMonth = new Date(YEAR, MONTH + 1, 0).getDate();

for (let i = 0; i < lead; i++) {
  const b = document.createElement('div');
  b.className = 'cell blank';
  grid.appendChild(b);
}

for (let d = 1; d <= daysInMonth; d++) {
  const cell = document.createElement('div');
  cell.className = 'cell';
  if (d >= OVERLAP.start && d <= OVERLAP.end) cell.classList.add('overlap');
  if (TODAY.getFullYear() === YEAR && TODAY.getMonth() === MONTH && TODAY.getDate() === d) {
    cell.classList.add('today');
  }

  const num = document.createElement('div');
  num.className = 'daynum';
  num.textContent = d;
  cell.appendChild(num);

  (EVENTS[d] || []).forEach((ev, idx) => {
    const chip = document.createElement('div');
    chip.className = 'chip ' + ev.cat;
    chip.textContent = ev.label;
    chip.addEventListener('click', () => openEvent(d, idx));
    cell.appendChild(chip);
  });

  grid.appendChild(cell);
}

// ---- Modal: pop out the matching timeline card ----
const WEEKDAYS = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
const MONTH_NAMES = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
const modal = document.getElementById('modal');
const modalCards = document.getElementById('modalCards');
const modalDate = document.getElementById('modalDate');
let timelineCards = null;

async function loadCards() {
  if (timelineCards) return timelineCards;
  const html = await fetch('index.html').then(r => r.text());
  const doc = new DOMParser().parseFromString(html, 'text/html');
  timelineCards = {};
  doc.querySelectorAll('.day-block').forEach(block => {
    const num = block.querySelector('.day-num')?.textContent.trim();
    const cards = [...block.querySelectorAll('.events-col > .card')].map(c => c.outerHTML);
    if (num) timelineCards[num] = cards;
  });
  return timelineCards;
}

async function openEvent(day, idx) {
  const cards = await loadCards();
  const card = (cards[String(day)] || [])[idx];
  if (!card) return;
  const wd = WEEKDAYS[new Date(YEAR, MONTH, day).getDay()];
  modalDate.textContent = wd + ' ' + day + ' ' + MONTH_NAMES[MONTH] + ' ' + YEAR;
  modalCards.innerHTML = card;
  modal.classList.add('open');
}

function closeModal() { modal.classList.remove('open'); }

document.getElementById('modalClose').addEventListener('click', closeModal);
modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
</body>
</html>
